# Kalibracja kamery dla RoboMVP
body_camera:
  width: 640
  height: 480
  camera_matrix:
    fx: 600.0
    fy: 600.0
    cx: 320.0
    cy: 240.0
  distortion_coeffs:
    k1: -0.05
    k2: 0.02
    p1: 0.001
    p2: 0.001
    k3: 0.0
  ros_topic: /camera/body/image_raw

head_camera:
  width: 1280
  height: 720
  camera_matrix:
    fx: 900.0
    fy: 900.0
    cx: 640.0
    cy: 360.0
  distortion_coeffs:
    k1: -0.03
    k2: 0.01
    p1: 0.0005
    p2: 0.0005
    k3: 0.0
  ros_topic: /camera/head/image_raw

marker_size: 0.1
